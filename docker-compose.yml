services:
  postgres:
    image: postgres:16
    container_name: messenger-postgres
    environment:
      POSTGRES_DB: messengerdb
      POSTGRES_USER: messenger
      POSTGRES_PASSWORD: messenger123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U messenger -d messengerdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: messenger-app
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/messengerdb
      SPRING_DATASOURCE_USERNAME: messenger
      SPRING_DATASOURCE_PASSWORD: messenger123

volumes:
  postgres_data: