<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Успішний вхід</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
  <div class="card">
    <div class="success-icon">✓</div>
    <h1>Вхід успішний!</h1>
    <p class="subtitle">Ласкаво просимо, <strong th:text="${phoneNumber}"></strong></p>
    <div class="success-details">
      <p>✅ Пароль перевірено</p>
      <p>✅ Google Authenticator підтверджено</p>
      <p>✅ PIN-код перевірено</p>
    </div>
    <a href="/login" class="btn">Вийти</a>
  </div>
</div>
</body>
</html>
