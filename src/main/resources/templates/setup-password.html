<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Реєстрація — Крок 3</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <div class="card">
        <div class="steps">
            <span class="step done">✓</span>
            <span class="step-line"></span>
            <span class="step done">✓</span>
            <span class="step-line"></span>
            <span class="step active">3</span>
            <span class="step-line"></span>
            <span class="step">4</span>
        </div>
        <h1>Пароль</h1>
        <p class="subtitle">Придумайте надійний пароль для вашого акаунта</p>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <form action="/register/setup-password" method="post">
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" name="password" placeholder="Мінімум 8 символів" minlength="8" required autofocus>
            </div>
            <div class="form-group">
                <label>Підтвердження паролю</label>
                <input type="password" name="confirmPassword" placeholder="Повторіть пароль" required>
            </div>
            <button type="submit" class="btn">Далі →</button>
        </form>
    </div>
</div>
</body>
</html>
