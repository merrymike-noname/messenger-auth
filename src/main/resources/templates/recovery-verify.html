<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Відновлення — Крок 2</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
  <div class="card">
    <div class="steps">
      <span class="step done">✓</span>
      <span class="step-line"></span>
      <span class="step active">2</span>
      <span class="step-line"></span>
      <span class="step">3</span>
      <span class="step-line"></span>
      <span class="step">4</span>
    </div>
    <h1>Підтвердження</h1>
    <p class="subtitle">Код підтвердження надіслано у Telegram на номер <strong th:text="${phoneNumber}"></strong></p>

    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <form action="/recovery/verify" method="post">
      <div class="form-group">
        <label>6-значний код</label>
        <input type="text" name="otp" placeholder="123456"
               maxlength="6" pattern="[0-9]{6}" required autofocus class="otp-input">
      </div>
      <button type="submit" class="btn">Підтвердити →</button>
    </form>

    <a href="/recovery" class="link">← Змінити номер</a>
  </div>
</div>
</body>
</html>
